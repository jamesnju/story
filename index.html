<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💖 Stacie, you're everything to me</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe9f4 0%, #ffd9e8 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 245, 248, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            box-shadow: 0 20px 40px rgba(255, 80, 120, 0.2), 0 8px 16px rgba(255, 100, 150, 0.1);
            padding: 32px 28px 40px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #b3416b;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        h1 span {
            background: #ffb6d0;
            padding: 0 16px;
            border-radius: 60px;
            font-size: 1.9rem;
            line-height: 1.4;
            color: #721c3f;
        }
        .sub {
            font-size: 1.1rem;
            color: #a34b6b;
            background: rgba(255, 220, 235, 0.6);
            padding: 8px 18px;
            border-radius: 60px;
            display: inline-block;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .question-box {
            background: white;
            border-radius: 48px;
            padding: 24px 20px 20px;
            margin: 20px 0 18px;
            box-shadow: 0 8px 0 #f4c0d4, 0 12px 28px rgba(200, 70, 120, 0.15);
            border: 1px solid #ffdbe9;
            transition: all 0.3s ease;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #3d1c2b;
            margin-bottom: 16px;
            line-height: 1.4;
            min-height: 4.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 12px 0 6px;
        }
        .option-btn {
            background: #fcecf2;
            border: 2px solid #ffb0cc;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #631e3a;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 0 #d48ca8;
            flex: 1 0 auto;
            min-width: 100px;
            letter-spacing: 0.3px;
        }
        .option-btn:hover {
            transform: scale(0.96) translateY(2px);
            box-shadow: 0 2px 0 #b86f8b;
            background: #ffdceb;
        }
        .option-btn:active {
            transform: scale(0.92) translateY(4px);
            box-shadow: 0 0px 0 #b86f8b;
        }
        .feedback {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 16px 0 8px;
            padding: 12px 16px;
            border-radius: 40px;
            background: rgba(255, 225, 240, 0.7);
            color: #552b3c;
            min-height: 4.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #ff9bbd;
            transition: all 0.3s ease;
        }
        .progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 16px 0 8px;
            flex-wrap: wrap;
        }
        .dot {
            height: 12px;
            width: 12px;
            background: #fbc4d9;
            border-radius: 20px;
            transition: 0.25s;
            border: 1px solid #f59ab9;
        }
        .dot.active {
            background: #e05385;
            width: 28px;
            border-color: #b33a68;
            box-shadow: 0 0 0 3px #ffc1da;
        }
        .phone-section {
            margin-top: 28px;
            background: #ffebf2;
            border-radius: 80px;
            padding: 20px 20px 24px;
            border: 2px solid #ffaec9;
            box-shadow: 0 8px 0 #cf8aa6;
            transition: 0.3s;
        }
        .phone-section h3 {
            font-size: 1.8rem;
            color: #771f45;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .phone-input-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 6px 0 4px;
        }
        #phoneInput {
            border: 3px solid #f59ab9;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            background: white;
            outline: none;
            width: 200px;
            text-align: center;
            color: #3d1c2b;
            font-family: 'Quicksand', sans-serif;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
        }
        #phoneInput:focus {
            border-color: #c24774;
            box-shadow: 0 0 0 5px #ffd5e6;
            transform: scale(1.02);
        }
        #phoneSubmit {
            background: #d65a85;
            border: none;
            border-radius: 60px;
            padding: 14px 32px;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #873f5b;
            transition: 0.08s linear;
            border: 1px solid #ffb3cf;
            font-family: 'Quicksand', sans-serif;
        }
        #phoneSubmit:hover {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #873f5b;
            background: #c74c78;
        }
        #phoneSubmit:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #873f5b;
        }
        .phone-message {
            margin-top: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #871f48;
            background: #ffdbe9;
            padding: 6px 14px;
            border-radius: 60px;
            display: inline-block;
        }
        .reset-area {
            margin-top: 20px;
        }
        #resetBtn {
            background: transparent;
            border: 2px solid #cf88a4;
            color: #6e2b44;
            padding: 6px 22px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Quicksand', sans-serif;
        }
        #resetBtn:hover {
            background: #ffd5e6;
            transform: scale(0.96);
        }
        .bounce-in {
            animation: bounce 0.5s ease;
        }
        @keyframes bounce {
            0% { transform: scale(0.8); opacity: 0.4; }
            60% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }
        .floating {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .wink {
            animation: wink 1.2s infinite;
        }
        @keyframes wink {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(4deg) scale(1.02); }
            75% { transform: rotate(-2deg); }
            100% { transform: rotate(0deg); }
        }
        .sad-face {
            font-size: 5rem;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .guilt-message {
            background: #ffe0e8;
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #ff8aa8;
        }
        .hidden {
            display: none !important;
        }
        .heart-rain {
            font-size: 1.5rem;
            animation: floatHeart 4s ease-in-out infinite;
        }
        @keyframes floatHeart {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }
        @media (max-width: 480px) {
            .card { padding: 24px 16px; }
            h1 { font-size: 1.8rem; }
            .question-text { font-size: 1.3rem; }
            .option-btn { font-size: 0.9rem; padding: 10px 16px; min-width: 80px; }
        }
    </style>
</head>
<body>
<div class="card" id="app">
    <h1>
        <span>🌸</span> Stacie, you're everything to me <span>🌸</span>
    </h1>
    <div class="sub">✨ with all my heart ✨</div>

    <!-- question area -->
    <div class="question-box" id="questionBox">
        <div class="question-text" id="questionText">Loading...</div>
        <div class="options" id="optionsContainer"></div>
        <div class="feedback" id="feedback">💬 what do you say?</div>
    </div>

    <!-- progress dots -->
    <div class="progress" id="progressDots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <!-- phone + form section -->
    <div class="phone-section" id="phoneSection" style="display: none;">
        <h3>💖 you made me the happiest man alive!</h3>
        <p style="font-size:1.2rem; color:#4d2636; font-weight:600; margin-bottom: 10px;">can i have your number? i promise to cherish it forever 💌</p>

        <form id="formspreeForm" action="https://formspree.io/f/xwvdwjoo" method="POST">
            <input type="hidden" name="answers" id="answersHidden" value="" />

            <div class="phone-input-group">
                <input type="tel" id="phoneInput" name="phone" placeholder="📞 07X XXX XXXX" maxlength="15" required />
                <button type="submit" id="phoneSubmit">💖 send</button>
            </div>
        </form>

        <div id="phoneMessage" class="phone-message">✨ can't wait to text you ✨</div>
    </div>

    <!-- reset -->
    <div class="reset-area">
        <button id="resetBtn">🔄 start over</button>
    </div>
</div>

<script>
    (function() {
        // ----- 12 questions full of love, admiration, and care -----
        const questions = [
            {
                text: "Hi Stacie. 👋 I know this is bold, but I can't hold it in anymore...",
                options: ["What is it? 🤔", "Okay, go on... 👀"],
                feedbackMap: {
                    "What is it? 🤔": "I think about you all the time. Your smile, your laugh, everything.",
                    "Okay, go on... 👀": "You're the most beautiful soul I've ever met. I mean that."
                }
            },
            {
                text: "Do you know how amazing you are? Because I need you to know... ✨",
                options: ["Tell me more... 😊", "I don't feel amazing... 🥺"],
                feedbackMap: {
                    "Tell me more... 😊": "You light up every room you walk into. You're kind, smart, and so incredibly beautiful.",
                    "I don't feel amazing... 🥺": "Then let me show you. You're the most incredible person I know, Stacie."
                }
            },
            {
                text: "When I see you, my heart skips a beat. Do you feel that too? 💓",
                options: ["Yes, I feel it too 💕", "Not really... 😕"],
                feedbackMap: {
                    "Yes, I feel it too 💕": "🥺 Really? That makes me so happy. I think we're meant to be.",
                    "Not really... 😕": "That's okay... I'll wait for you. I'll always wait."
                }
            },
            {
                text: "I would do anything to make you smile. Anything. What would make you smile right now? 🌟",
                options: ["A hug 🤗", "A funny joke 😂", "Just you being you 😌"],
                feedbackMap: {
                    "A hug 🤗": "I'd give you the warmest hug and never let go. 🤗",
                    "A funny joke 😂": "Why did the scarecrow win an award? He was outstanding in his field! 😂",
                    "Just you being you 😌": "That's the sweetest thing. I'll always be me, for you."
                }
            },
            {
                text: "Do you know I'd protect you with my life? I mean it. You mean that much to me. 🛡️",
                options: ["That's really sweet 🥰", "You're too much 😅"],
                feedbackMap: {
                    "That's really sweet 🥰": "I mean every word. I'd shield you from anything and everything.",
                    "You're too much 😅": "Maybe I am... but that's because you're worth everything."
                }
            },
            {
                text: "I want to be the one who makes you laugh, holds you when you're sad, and celebrates your wins. 🎉",
                options: ["I'd like that 💕", "I don't know... 😔"],
                feedbackMap: {
                    "I'd like that 💕": "Then let me be that person. I promise I'll never let you down.",
                    "I don't know... 😔": "Take your time. I'll be here, waiting with open arms."
                }
            },
            {
                text: "Stacie, you're the first thing I think about in the morning and the last at night. 🌅",
                options: ["That's so romantic 💗", "Really? 🥺"],
                feedbackMap: {
                    "That's so romantic 💗": "Because it's true. You've completely captured my heart.",
                    "Really? 🥺": "Really. You're always on my mind, Stacie."
                }
            },
            {
                text: "I promise to always be honest with you, support you, and never hurt you. Can you trust that? 🤝",
                options: ["I trust you  💖", "I want to... but I'm scared 💔"],
                feedbackMap: {
                    "I trust you  💖": "That means more to me than you'll ever know. I won't break that trust.",
                    "I want to... but I'm scared 💔": "I understand. I'll be patient and show you that I'm worthy of your trust."
                }
            },
            {
                text: "Will you let me be your friend first? Your best friend? And maybe more? 🥹",
                options: ["Yes, I'd love that 💕", "I need more time... ⏳"],
                feedbackMap: {
                    "Yes, I'd love that 💕": "I promise to be the best friend you've ever had. And I'll hope for more every day.",
                    "I need more time... ⏳": "Take all the time you need. I'm not going anywhere."
                }
            },
            {
                text: "I want to be the one who sees your true self, the real Stacie. Will you let me in? 🥺",
                options: ["Yes, you can see the real me 💗", "I'm scared of being vulnerable 😰"],
                feedbackMap: {
                    "Yes, you can see the real me 💗": "Thank you for trusting me with that. I'll treasure every part of you.",
                    "I'm scared of being vulnerable 😰": "I get it. But with me, you're safe. I'll never judge you."
                }
            },
            {
                text: "Stacie, I'm falling for you. Hard. And I don't want to stop. Is that okay? 💘",
                options: ["Yes, I'm falling too 💕", "I don't know what to feel... 😶"],
                feedbackMap: {
                    "Yes, I'm falling too 💕": "🥺 I can't tell you how happy that makes me. Let's fall together.",
                    "I don't know what to feel... 😶": "That's okay. I'll wait until you know. I'll always be here."
                }
            },
            {
                text: "Will you give me a chance? A real chance to show you how much I care? 🙏",
                options: ["Yes, I'll give you a chance 💖", "No, I'm sorry... 😔"],
                feedbackMap: {
                    "Yes, I'll give you a chance 💖": "You just made my whole year. I promise I'll never make you regret this.",
                    "No, I'm sorry... 😔": "💔 I understand... but please know I'll always care about you."
                }
            }
        ];

        // ----- state -----
        let currentQuestionIndex = 0;
        let answers = [];
        let allAnswered = false;
        let isRejected = false;

        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedbackDiv = document.getElementById('feedback');
        const progressDots = document.querySelectorAll('.dot');
        const phoneSection = document.getElementById('phoneSection');
        const phoneInput = document.getElementById('phoneInput');
        const phoneMessage = document.getElementById('phoneMessage');
        const resetBtn = document.getElementById('resetBtn');
        const form = document.getElementById('formspreeForm');
        const answersHidden = document.getElementById('answersHidden');
        const questionBox = document.getElementById('questionBox');

        // ----- render question -----
        function renderQuestion(index) {
            if (index >= questions.length || isRejected) {
                if (isRejected) {
                    questionBox.style.display = 'none';
                    phoneSection.style.display = 'none';
                    feedbackDiv.innerHTML = `
                        <div style="text-align:center; width:100%;">
                            <div class="sad-face">😢</div>
                            <div class="guilt-message">
                                <h3 style="color:#b3416b;">💔 You broke my heart...</h3>
                                <p style="font-size:1.1rem; margin-top:10px; line-height:1.6;">
                                    I poured my heart out to you, Stacie. I showed you my true self.<br>
                                    I promised to protect you, care for you, and love you forever.<br><br>
                                    <span style="font-weight:700; color:#8a2a4a; font-size:1.2rem;">
                                        And still, you said no. 💔
                                    </span><br><br>
                                    I hope you feel a little guilty... because I'll always be here, waiting for you.<br>
                                    I'll never stop caring about you. Never.<br><br>
                                    <span style="font-size:1.5rem;">💔💔💔</span>
                                </p>
                                <p style="margin-top:15px; font-size:1.1rem; color:#555;">
                                    <em>I'll still be your friend... if you ever change your mind. 💕</em>
                                </p>
                            </div>
                            <form id="rejectionForm" action="https://formspree.io/f/xwvdwjoo" method="POST" style="margin-top:15px;">
                                <input type="hidden" name="rejection" value="Stacie said NO 😢" />
                                <input type="hidden" name="answers" value='["Stacie said NO"]' />
                                <button type="submit" style="background:#d65a85; border:none; border-radius:60px; padding:12px 30px; color:white; font-weight:700; cursor:pointer; font-family:'Quicksand',sans-serif; box-shadow:0 4px 0 #873f5b;">
                                    😔 Submit (so you remember this moment)
                                </button>
                            </form>
                        </div>
                    `;
                    feedbackDiv.style.border = '2px solid #ff6b8a';
                    return;
                }

                // Accepted!
                document.querySelector('.question-box').style.display = 'none';
                phoneSection.style.display = 'block';
                allAnswered = true;
                feedbackDiv.textContent = '💖 You said YES! You just made me the happiest person alive!';
                feedbackDiv.style.border = '2px solid #ff6b8a';
                answersHidden.value = JSON.stringify(answers);
                progressDots.forEach(dot => dot.classList.add('active'));
                return;
            }

            document.querySelector('.question-box').style.display = 'block';
            phoneSection.style.display = 'none';
            allAnswered = false;

            const q = questions[index];
            questionText.textContent = q.text;
            optionsContainer.innerHTML = '';

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.addEventListener('click', function() {
                    answers[index] = opt;
                    const feedbackMsg = q.feedbackMap[opt] || '😊 thank you for being honest.';
                    feedbackDiv.textContent = feedbackMsg;
                    feedbackDiv.classList.add('bounce-in');
                    setTimeout(() => feedbackDiv.classList.remove('bounce-in'), 400);

                    // Update progress dots
                    progressDots.forEach((dot, i) => {
                        if (i <= index) dot.classList.add('active');
                        else dot.classList.remove('active');
                    });

                    // Check if this is the "No" answer on the final question
                    if (opt === "No, I'm sorry... 😔") {
                        isRejected = true;
                        // Submit rejection
                        const rejectionData = {
                            rejection: "Stacie said NO 😢",
                            answers: JSON.stringify([...answers])
                        };
                        fetch('https://formspree.io/f/xwvdwjoo', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(rejectionData)
                        }).then(() => {
                            renderQuestion(questions.length);
                        }).catch(() => {
                            renderQuestion(questions.length);
                        });
                        return;
                    }

                    // If "Yes" on final question
                    if (opt === "Yes, I'll give you a chance 💖") {
                        setTimeout(() => {
                            currentQuestionIndex++;
                            renderQuestion(currentQuestionIndex);
                        }, 600);
                        return;
                    }

                    // Any other answer
                    setTimeout(() => {
                        if (currentQuestionIndex < questions.length - 1) {
                            currentQuestionIndex++;
                            renderQuestion(currentQuestionIndex);
                        } else {
                            currentQuestionIndex++;
                            renderQuestion(currentQuestionIndex);
                        }
                    }, 500);
                });
                optionsContainer.appendChild(btn);
            });

            if (answers[index]) {
                const prevFeedback = q.feedbackMap[answers[index]] || '😊 nice choice!';
                feedbackDiv.textContent = prevFeedback;
            } else {
                feedbackDiv.textContent = '💬 what do you say?';
            }
        }

        // ----- handle form submission -----
        form.addEventListener('submit', function(e) {
            const phoneVal = phoneInput.value.trim();
            if (phoneVal.length < 6) {
                e.preventDefault();
                phoneMessage.textContent = '😅 hmm, that’s too short… try again?';
                phoneMessage.style.color = '#b3416b';
                return;
            }

            answersHidden.value = JSON.stringify(answers);
            phoneMessage.textContent = '📤 sending your answers…';
            phoneMessage.style.color = '#1f7a4c';
        });

        // ----- reset -----
        function resetAll() {
            currentQuestionIndex = 0;
            answers = [];
            allAnswered = false;
            isRejected = false;
            document.querySelector('.question-box').style.display = 'block';
            phoneSection.style.display = 'none';
            phoneInput.value = '';
            phoneMessage.textContent = '✨ can\'t wait to text you ✨';
            phoneMessage.style.color = '#871f48';
            answersHidden.value = '';
            feedbackDiv.innerHTML = '💬 what do you say?';
            feedbackDiv.style.border = '1px dashed #ff9bbd';
            progressDots.forEach((dot, i) => {
                if (i === 0) dot.classList.add('active');
                else dot.classList.remove('active');
            });
            renderQuestion(0);
        }

        resetBtn.addEventListener('click', resetAll);

        // Enter key on phone input
        phoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        // ----- init -----
        resetAll();

        // floating emojis
        document.querySelector('h1 span:first-child').classList.add('floating');
        document.querySelector('h1 span:last-child').classList.add('floating');

        // wink effect
        setInterval(() => {
            if (!allAnswered && !isRejected && document.querySelector('.question-box').style.display !== 'none') {
                const qText = document.getElementById('questionText');
                qText.classList.add('wink');
                setTimeout(() => qText.classList.remove('wink'), 1000);
            }
        }, 4000);
    })();
</script>
</body>
</html>
